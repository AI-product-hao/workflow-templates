name: Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy
        run: |
          # 你的部署逻辑
          echo "Deploying..."          
      
      - name: Call Notification Workflow
        if: always()
        uses: AI-product-hao/workflow-templates/.github/workflows/feishu-notification.yml@main
        with:
          status: ${{ job.status }}
        secrets:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
